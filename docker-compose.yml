version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount data and logs if we want to persist them outside the container locally
      # Comment out for production
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
